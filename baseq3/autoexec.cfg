set ttycon 0
set cl_renderer opengl2
set com_skipIdLogo 1
set com_introplayed 1
seta model homer/default
seta headmodel homer/default
set logfile 2
set s_musicvolume 0
bind l "set q3ide_lock 1"
set r_multiMonitor 1
set r_fullscreen 1
set r_mode -1
set cg_fov 90
set m_pitch -0.022
set sensitivity 8
set rconPassword "q3idedev666"
set cg_drawFPS 1
set vm_game 0
set sv_fps 125
set g_grapple 1
set g_grappleType 0
set sv_cheats 1
bind 1 "weapon 10"
bind 2 "+button5"
// grapple type cycling: 0=hook 1=rope 2=rail
bind g "toggle g_grappleType 0 1 2; echo grapple type: $g_grappleType"
