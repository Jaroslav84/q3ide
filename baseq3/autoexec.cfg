// == MEMORY ==
// NOTE: these are latched — passed as launch args by build.sh, not here.
// com_hunkMegs max safe = 2047 (signed int overflow above that). 1024 recommended for CiNEmatic.

// == TEXTURE QUALITY ==
seta r_picmip "0"                // full-res textures. walls/weapons/models look crisp not muddy. biggest diff up close on wall surfaces.
seta r_ext_texture_filter_anisotropic "1"  // enable anisotropic filtering
seta r_ext_max_anisotropy "16"   // 16x AF (max). floors/walls at angles stop looking blurry — huge diff on long corridors
seta r_textureMode "GL_LINEAR_MIPMAP_LINEAR"  // trilinear filtering (max). smoother texture transitions at distance, no popping
seta r_texturebits "32"          // 32-bit color depth (max). eliminates color banding — gradients/skies look smooth not stepped
seta r_detailtextures "1"        // close-up surface micro-detail. adds fine grain/noise to surfaces up close
seta r_roundImagesDown "0"       // don't round texture sizes down — keeps textures at exact resolution, pairs with r_picmip 0
seta r_ext_compressed_textures "0" // disable texture compression — raw quality, uses more VRAM (fine on 8GB)

// == LIGHTING ==
seta r_vertexLight "0"           // use lightmaps not vertex lighting — much higher quality, free win
seta r_dynamiclight "1"          // lights illuminate surfaces around them (explosions, rockets, pickups)
seta r_dlightMode "1"            // per-pixel dynamic lights instead of fake vertex blobs — way more accurate
seta r_overBrightBits "1"        // overbright multiplier — lit areas look richer, more contrast
seta r_mapOverBrightBits "2"     // map brightness multiplier — deeper shadows, brighter highlights

// == GEOMETRY & DETAIL ==
seta r_lodbias "-2"              // max geometric detail on models — less polygon popping at distance
seta r_subdivisions "1"          // max curve smoothness — arches, domes, pipes look round not blocky

// == SHADOWS ==
// injected automatically by build.sh based on renderer:
//   vulkan  → r_shadows 2  (stencil shadow volumes, Carmack's Reverse)
//   opengl2 → r_sunShadows 1 + r_shadowMapSize 2048 (cascaded shadow maps)

// == SKY ==
seta r_fastsky "0"               // render full skybox (clouds, stars, space) instead of flat color
seta r_drawSun "1"               // render sun disc in sky where map defines one
seta r_flares "1"                // lens flare on light sources — torches, lamps, pickups

// == BLOOM + HDR ==
seta r_bloom "1"                 // bright surfaces bleed light onto surroundings — explosions glow, lava pulses (Vulkan only)
seta r_bloom_threshold "0.6"     // brightness threshold — only surfaces above this level bloom
seta r_bloom_intensity "0.5"     // bloom strength — how much light bleeds out
seta r_hdr "1"                   // 16-bit internal framebuffer — smoother gradients, better bloom precision

// == DRAW DISTANCE ==
seta r_lodCurveError "250"       // max LOD curve error — geometry stays detailed further away

// == ANTI-ALIASING ==
seta r_ext_framebuffer_object "1" // required for MSAA to work
seta r_ext_multisample "8"       // 8x MSAA (max) — smooth edges on geometry, no more jaggies

set r_multiMonitor 1
bind o "+q3ide_overview"
bind i "+q3ide_focus3"
set rconPassword "q3idedev666"
set cg_drawFPS 1
set vm_game 0
set com_skipIdLogo 1
set com_introplayed 1
seta model homer/default
set ttycon 0
