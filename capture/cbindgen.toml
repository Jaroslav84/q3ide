# cbindgen configuration for q3ide-capture
# Generates q3ide_capture.h from Rust C-ABI exports

language = "C"
header = "/* q3ide_capture.h — Auto-generated by cbindgen. Do not edit. */"
include_guard = "Q3IDE_CAPTURE_H"
autogen_warning = "/* WARNING: This file is auto-generated by cbindgen. Do not modify. */"
tab_width = 4
style = "both"

[export]
prefix = "Q3ide"

[fn]
prefix = "q3ide_"

[enum]
prefix_with_name = true
rename_variants = "ScreamingSnakeCase"
